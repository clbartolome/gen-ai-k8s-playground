apiVersion: apps/v1
kind: Deployment
metadata:
  name: itsm-app
  labels:
    app.kubernetes.io/name: itsm-app
    app.kubernetes.io/component: itsm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: itsm-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: itsm-app
        app.kubernetes.io/component: itsm
    spec:
      securityContext:
        hostUsers: false
      containers:
        - name: itsm-app
          image: itsm-app:local
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: ITSM_DATABASE
              value: /data/itsm.db
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: session-secret
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: mcp-token
            # Used only when the SQLite DB has zero users (first start with emptyDir).
            - name: ITSM_BOOTSTRAP_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: bootstrap-admin-user
                  optional: true
            - name: ITSM_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: bootstrap-admin-password
                  optional: true
            - name: ITSM_EMBEDDING_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: embedding-base-url
                  optional: true
            - name: ITSM_EMBEDDING_MODEL
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: embedding-model
                  optional: true
            - name: ITSM_EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: itsm-secrets
                  key: embedding-api-key
                  optional: true
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: sqlite-data
          emptyDir: {}
