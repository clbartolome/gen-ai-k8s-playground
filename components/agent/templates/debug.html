<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gen AI Playground · Agent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=8">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <span class="topbar-title">Gen AI Playground</span>
      <span class="topbar-tag">Agent</span>
    </header>

    <header class="page-header">
      <div class="page-header-row">
        <div>
          <h1>Agent</h1>
          <p id="hint">Runtime monitor</p>
        </div>
        <span id="status-badge" class="badge badge-idle">idle</span>
      </div>
    </header>

    <section class="dashboard">
      <div class="stat-row">
        <div class="stat-panel">
          <span class="stat-label">Request started</span>
          <span id="started-at" class="stat-value">—</span>
        </div>
        <div class="stat-panel">
          <span class="stat-label">Request duration</span>
          <span id="duration" class="stat-value">—</span>
        </div>
      </div>

      <div class="panel panel-llm">
        <div class="panel-header panel-header-row">
          <span>LLM call</span>
          <span id="llm-status-badge" class="badge badge-llm-idle">idle</span>
        </div>
        <div class="llm-grid">
          <div class="llm-stat">
            <span class="llm-stat-label">Called at</span>
            <span id="llm-started-at" class="llm-stat-value">—</span>
          </div>
          <div class="llm-stat">
            <span class="llm-stat-label">LLM duration</span>
            <span id="llm-duration" class="llm-stat-value">—</span>
          </div>
          <div class="llm-stat">
            <span class="llm-stat-label">Finished at</span>
            <span id="llm-finished-at" class="llm-stat-value">—</span>
          </div>
          <div class="llm-stat">
            <span class="llm-stat-label">Input / output</span>
            <span id="llm-chars" class="llm-stat-value">—</span>
          </div>
        </div>
        <dl class="llm-meta">
          <div class="llm-meta-row">
            <dt>Model</dt>
            <dd id="llm-model">—</dd>
          </div>
          <div class="llm-meta-row">
            <dt>Endpoint</dt>
            <dd id="llm-endpoint">—</dd>
          </div>
          <div class="llm-meta-row">
            <dt>Timeout</dt>
            <dd id="llm-timeout">—</dd>
          </div>
        </dl>
      </div>

      <div class="panel">
        <div class="panel-header">Received message</div>
        <p id="message" class="panel-content">No requests yet.</p>
      </div>

      <div class="panel">
        <div class="panel-header">Response</div>
        <p id="response" class="panel-content muted">—</p>
      </div>

      <p id="error" class="error-banner" hidden></p>
    </section>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}?v=10"></script>
</body>
</html>
