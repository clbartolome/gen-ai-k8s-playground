<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gen AI Playground · Monitor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=5">
</head>
<body>
  <main class="stage">
    <div id="flow-track" class="flow-track">
      <p class="flow-empty">Waiting for activity…</p>
    </div>
  </main>

  <div id="modal-backdrop" class="modal-backdrop" hidden></div>
  <dialog id="detail-modal" class="detail-modal">
    <div class="modal-header">
      <div>
        <span id="modal-kind" class="modal-kind"></span>
        <h2 id="modal-title" class="modal-title"></h2>
        <p id="modal-meta" class="modal-meta"></p>
      </div>
      <button id="modal-close" class="modal-close" type="button" aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <section class="modal-section">
        <h3>Summary</h3>
        <p id="modal-summary" class="modal-summary"></p>
      </section>
      <section class="modal-section">
        <h3>Detail</h3>
        <div id="modal-fields" class="modal-fields"></div>
        <pre id="modal-json" class="modal-json" hidden></pre>
      </section>
    </div>
  </dialog>

  <script src="{{ url_for('static', filename='app.js') }}?v=6"></script>
</body>
</html>
