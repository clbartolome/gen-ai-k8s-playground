apiVersion: apps/v1
kind: Deployment
metadata:
  name: tools
  labels:
    app.kubernetes.io/name: tools
    app.kubernetes.io/component: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tools
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tools
        app.kubernetes.io/component: tools
    spec:
      securityContext:
        hostUsers: false
      containers:
        - name: tools
          image: gen-ai-k8s-playground-tools:local
          imagePullPolicy: Always
          ports:
            - name: hub
              containerPort: 9000
            - name: mcp
              containerPort: 9001
            - name: itsm
              containerPort: 9002
            - name: rag
              containerPort: 9003
          readinessProbe:
            httpGet:
              path: /health
              port: hub
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: hub
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
