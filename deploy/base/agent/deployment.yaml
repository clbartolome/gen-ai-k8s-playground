apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  labels:
    app.kubernetes.io/name: agent
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent
        app.kubernetes.io/component: agent
    spec:
      securityContext:
        hostUsers: false
      containers:
        - name: agent
          image: gen-ai-k8s-playground-agent:local
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DELAY_SECONDS
              value: "0"
          readinessProbe:
            httpGet:
              path: /debug/status
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /debug/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
