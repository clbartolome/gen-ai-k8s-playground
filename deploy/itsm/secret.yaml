# Demo defaults — change before any shared/production use.
# Embeddings (optional): set embedding-* for MCP rag_search_kb semantic search.
apiVersion: v1
kind: Secret
metadata:
  name: itsm-secrets
  labels:
    app.kubernetes.io/name: itsm-app
    app.kubernetes.io/component: itsm
type: Opaque
stringData:
  session-secret: "change-me-session-secret"
  mcp-token: "change-me-mcp-token"
  bootstrap-admin-user: "admin"
  bootstrap-admin-password: "admin"
  # Origin only (no path); app POSTs to {BASE}/v1/embeddings. Empty = RAG substring search only.
  embedding-base-url: "https://litellm-litemaas.apps.prod.rhoai.rh-aiservices-bu.com/v1/embeddings"
  embedding-model: "Nomic-embed-text-v2-moe"
  embedding-api-key: "sk-G1v0g75vKcD1PSRxWWiLYQ"
