<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gen AI Playground · Tools</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <span class="topbar-title">Gen AI Playground</span>
      <span class="topbar-tag">Tools</span>
    </header>

    <header class="page-header">
      <h1>Tools</h1>
      <p>Platform MCP (AAP / health). ITSM + Knowledge Base live in itsm-app MCP.</p>
    </header>

    <section class="dashboard">
      <div class="services">
        <article class="service-card">
          <div class="service-head">
            <h2>MCP</h2>
            <span class="port">:{{ mcp_port }}</span>
          </div>
          <p>Platform state — health, events, alerts, AAP workflows</p>
          <code>GET /tools</code>
          <code>POST /tools/&lt;name&gt;/invoke</code>
        </article>
      </div>

      <div class="panel">
        <div class="panel-header">Recent activity</div>
        <div id="activity" class="activity-grid">
          <p class="muted">Waiting for API calls...</p>
        </div>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}?v=2"></script>
</body>
</html>
