apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: itsm-app
  labels:
    app.kubernetes.io/name: itsm-app
    app.kubernetes.io/component: itsm
  annotations:
    openshift.io/description: "ITSM UI + REST /api/v1 + MCP /mcp/ (KB RAG + tickets)"
spec:
  to:
    kind: Service
    name: itsm-app
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
